button:
  - platform: restart
    name: "Restart"
    id: restart_button
    entity_category: config

  # - platform: factory_reset
  #   name: "Factory Reset"
  #   id: reset
  #   entity_category: config

  - platform: safe_mode
    name: "Safe Mode"
    internal: false
    entity_category: config