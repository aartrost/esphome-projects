esp32:
  board: seeed_xiao_esp32c6
  framework:
    type: esp-idf

esphome:
    name: micro-air-softstart
    friendly_name: AC Soft Starter
    on_boot:
        priority: -10
        then:
            # Disable external antenna by default (FM8625H RF switch)
            - output.turn_off: rf_switch_enable    # LOW -> RF switch power ON
            - output.turn_on: rf_antenna_select    # HIGH -> external antenna (U.FL)
            # Initialize sensors to 0 on boot (avoid "Unknown" state)
            - sensor.template.publish:
                  id: live_current_sen
                  state: 0.0
            - sensor.template.publish:
                  id: live_power_sen
                  state: 0.0
            - sensor.template.publish:
                  id: line_frequency_sen
                  state: 0.0
            # Restore persisted sensors from flash
            - sensor.template.publish:
                  id: total_faults_sen
                  state: !lambda 'return id(_last_total_faults);'
            - sensor.template.publish:
                  id: total_starts_sen
                  state: !lambda 'return id(_last_total_starts);'
            - sensor.template.publish:
                  id: last_start_peak_sen
                  state: !lambda 'return id(_last_start_peak);'

captive_portal:
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:

api:
  encryption:
    key: !secret home_assistant_key

ota:
  - platform: esphome

# Enable logging
logger:
  level: info

esp32_ble:
    max_connections: 4

ble_client:
  - mac_address: CC:19:4C:13:EE:D8
    id: ble_client_1
    auto_connect: true
    on_connect:
        then:
            - delay: 1s
            - switch.turn_on: easystart_read
    on_disconnect:
        then:
            - switch.turn_off: easystart_read
            - sensor.template.publish:
                  id: live_current_sen
                  state: 0.0
            - sensor.template.publish:
                  id: live_power_sen
                  state: 0.0
            - sensor.template.publish:
                  id: line_frequency_sen
                  state: 0.0

# Buttons
button:
    - platform: restart
      name: "Restart Device"

text_sensor:
  - platform: uptime
    name: Uptime
    update_interval: 1d
    format:
      separator: " "
      days: "D"
  - platform: template
    name: "Status"
    id: status

sensor:
  - platform: ble_client
    type: rssi
    ble_client_id: ble_client_1
    name: "Bluetooth RSSI"

  - platform: wifi_signal
    id: wifi_signal_dbm
    name: "Wi‑Fi RSSI"
    update_interval: 30s
    entity_category: diagnostic

  - platform: template
    name: "Live Current"
    id: live_current_sen
    device_class: current
    state_class: measurement
    unit_of_measurement: "A"

  - platform: template
    name: "Line Frequency"
    id: line_frequency_sen
    device_class: frequency
    state_class: measurement
    unit_of_measurement: "Hz"

  - platform: template
    name: "Last Start Peak"
    id: last_start_peak_sen
    device_class: current
    state_class: measurement
    unit_of_measurement: "A"

  - platform: template
    name: "SCPT Delay"
    id: scpt_delay_sen
    unit_of_measurement: "s"
    accuracy_decimals: 0

  - platform: template
    name: "Total Faults"
    state_class: total
    id: total_faults_sen
    accuracy_decimals: 0

  - platform: template
    name: "Total Starts"
    state_class: total
    id: total_starts_sen
    accuracy_decimals: 0

  - platform: template
    name: "Live Power"
    id: live_power_sen
    device_class: power
    state_class: measurement
    unit_of_measurement: "W"

  - platform: total_daily_energy
    name: "Energy (Daily)"
    state_class: total_increasing
    power_id: live_power_sen
    unit_of_measurement: "kWh"
    accuracy_decimals: 2
    method: left
    filters:
        - multiply: 0.001

  - platform: integration
    name: "Energy (Total)"
    sensor: live_power_sen
    unit_of_measurement: "kWh"
    state_class: total_increasing
    device_class: energy
    accuracy_decimals: 2
    time_unit: h
    integration_method: left
    restore: true
    filters:
        - multiply: 0.001

  - platform: ble_client
    type: characteristic
    ble_client_id: ble_client_1
    service_uuid:        "d973f2e0-b19e-11e2-9e96-0800200c9a66"
    characteristic_uuid: "d973f2e1-b19e-11e2-9e96-0800200c9a66"
    name: "EasyStart Diag"
    update_interval: never
    notify: True
    lambda: |-

        std::vector<std::string> statusText = {
            "Normal",
            "Unexpected Curr Flt",
            "Short Cycle Delay",
            "Pwr Intrrptn Fault",
            "Stall Fault",
            "Stuck SR Fault",
            "Open Ovrld Fault",
            "Overcurrent Fault",
            "Bad Wiring Fault",
            "Wrong Voltage Flt"
        };

        uint8_t* data = (uint8_t*) x.data();
        size_t length = x.size();

        // Convert the response to a hexadecimal string
        std::string hex_str;
        for (size_t i = 0; i < length; ++i) {
            char buf[3];
            snprintf(buf, sizeof(buf), "%02X", data[i]);
            hex_str += buf;
        }

        // Check if the response contains the success message
        std::string response = std::string((char*)x.data(), x.size());
        if (response.find("{\"Sts\": Success}") != std::string::npos) {
            ESP_LOGD("ble_client", "Success Response: %s", response.c_str());
        } else {
            ESP_LOGD("ble_client", "Data Response (Hex): %s", hex_str.c_str());

            // Ensure there are enough bytes for extraction
            if (length >= 18) {
                float factor = 256.0;
                float powerfactor = id(power_factor_num).state;

                // Extract and log Live Current
                float live_current = ((data[4] & 0xFF) + ((data[5] & 0xFF) * factor)) / 10.0;
                ESP_LOGD("ble_client", "Live Current: %.1f", live_current);
                if (live_current >= 0.0 && live_current <= 50.0) {
                    id(live_current_sen).publish_state(live_current);
                    id(live_power_sen).publish_state((live_current * 240.0) * powerfactor);
                } else {
                    ESP_LOGW("ble_client", "Live Current out of range (%.1f A), discarding", live_current);
                }

                // Extract and log Line Frequency
                float line_frequency = 500000.0 / ((data[6] & 0xFF) + ((data[7] & 0xFF) * factor));
                ESP_LOGD("ble_client", "Line Frequency: %.1f", line_frequency);
                id(line_frequency_sen).publish_state(line_frequency);

                // Extract and log Last Start Peak
                float last_start_peak = ((data[8] & 0xFF) + ((data[9] & 0xFF) * factor)) / 10.0;
                ESP_LOGD("ble_client", "Last Start Peak: %.1f", last_start_peak);
                if (last_start_peak >= 1.0) {
                  id(_last_start_peak) = last_start_peak;
                  id(last_start_peak_sen).publish_state(last_start_peak);
                }

                // Extract and log SCPT Delay
                uint16_t scpt_delay = (data[10] & 0xFF) + ((data[11] & 0xFF) * 256);
                ESP_LOGD("ble_client", "SCPT Delay: %u", scpt_delay);
                id(scpt_delay_sen).publish_state(scpt_delay);

                // Extract and log Total Faults
                uint16_t total_faults = (data[12] & 0xFF) + ((data[13] & 0xFF) * 256);
                ESP_LOGD("ble_client", "Total Faults: %u", total_faults);
                id(_last_total_faults) = total_faults;
                id(total_faults_sen).publish_state(total_faults);

                // Extract and log Total Starts
                uint32_t total_starts = data[14] + (data[15] << 8) + (data[16] << 16) + (data[17] << 24);
                ESP_LOGD("ble_client", "Total Starts: %u", total_starts);
                id(_last_total_starts) = total_starts;
                id(total_starts_sen).publish_state(total_starts);

                // Extract and log Status Text
                uint8_t status_index = data[2] & 0xFF;
                ESP_LOGD("ble_client", "Status: %u", status_index);
                std::string status_str;
                if (status_index < statusText.size()) {
                    status_str = statusText[status_index];
                } else {
                    status_str = "Unknown";
                }
                id(status).publish_state(status_str);

            } else {
                ESP_LOGD("ble_client", "Data Response is too short to extract all values");
            }
        }

        // Return a dummy value to comply with the lambda return type
        return (float)length;

number:
  - platform: template
    name: "Power Factor"
    id: power_factor_num
    min_value: 0.5
    max_value: 1.0
    step: 0.01
    initial_value: 1.0
    restore_value: true
    optimistic: true
    entity_category: config

# Switches
switch:
    - platform: template
      name: "External Antenna"
      optimistic: true
      restore_mode: ALWAYS_ON
      turn_on_action:
          - output.turn_off: rf_switch_enable    # LOW -> RF switch power ON
          - output.turn_on: rf_antenna_select    # HIGH -> external antenna (U.FL/RF2)
      turn_off_action:
          - output.turn_off: rf_switch_enable    # LOW -> RF switch power ON
          - output.turn_off: rf_antenna_select   # LOW -> internal antenna (PCB/RF1)

    - platform: template
      id: easystart_read
      name: "Read Status"
      restore_mode: RESTORE_DEFAULT_OFF
      turn_on_action:
          then:
              - switch.template.publish:
                    id: easystart_read
                    state: ON
              - while:
                    condition:
                        - switch.is_on: easystart_read
                    then:
                        - ble_client.ble_write:
                              id: ble_client_1
                              service_uuid: "d973f2e0-b19e-11e2-9e96-0800200c9a66"
                              characteristic_uuid: "d973f2e2-b19e-11e2-9e96-0800200c9a66"
                              value: [0x7B, 0x22, 0x43, 0x6D, 0x64, 0x22, 0x3A, 0x20, 0x52, 0x65, 0x61, 0x64, 0x4C, 0x69, 0x76, 0x65, 0x7D]
                        - delay: 5s
      turn_off_action:
          then:
              - switch.template.publish:
                    id: easystart_read
                    state: OFF

# External antenna control using ESPHome 2025.12+ board aliases (FM8625H RF switch)
# RF_SWITCH_EN (GPIO3) = RF switch power, RF_ANT_SELECT (GPIO14) = antenna selector
output:
    - platform: gpio
      id: rf_switch_enable
      pin: RF_SWITCH_EN

    - platform: gpio
      id: rf_antenna_select
      pin: RF_ANT_SELECT

globals:
    # Total starts counter (persisted across reboots)
    - id: _last_total_starts
      type: uint32_t
      restore_value: yes
      initial_value: '0'
    # Total faults counter (persisted across reboots)
    - id: _last_total_faults
      type: uint16_t
      restore_value: yes
      initial_value: '0'
    # Last start peak current (persisted across reboots)
    - id: _last_start_peak
      type: float
      restore_value: yes
      initial_value: '0.0'

time:
    - platform: sntp
      id: sntp_time
      servers:
          - 0.pool.ntp.org
          - 1.pool.ntp.org